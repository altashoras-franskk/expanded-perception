const STORAGE_KEY = "mindhive-dashboard-v6";
function loadState(key, fallback) {
  try { const d = localStorage.getItem(`${STORAGE_KEY}-${key}`); return d ? JSON.parse(d) : fallback; }
  catch { return fallback; }
}
function saveState(key, data) {
  try { localStorage.setItem(`${STORAGE_KEY}-${key}`, JSON.stringify(data)); } catch {}
}

    theory: "Frayling (1993) distinguiu: research INTO design (estudar design), research FOR design (gerar conhecimento para projetar), research THROUGH design (o artefato é o veículo de investigação). A T4P é research through artifact: o artefato não ilustra a tese — é o veículo pelo qual a tese é investigada, testada e demonstrada. Posição metodológica fundamental para o paper Open Science: legitima o artefato como forma de conhecimento, não como ilustração de teoria. Gaver (2012) e Zimmerman et al. (2007) avançaram os critérios de rigor.",
    keyWorks: ["Frayling — Research in Art and Design (1993)", "Gaver — What Should We Expect from Research Through Design? (2012)", "Zimmerman, Forlizzi & Evenson — Research Through Design as a Method (2007)"],
    quote: "\"The artefact IS the argument.\"" },
  { id: "cognition-4e", label: "Cognição 4E", group: "conceitos", subtitle: "Embodied · Embedded · Enacted · Extended", weight: 9, status: "evidência",
    theory: "Família de abordagens da ciência cognitiva contemporânea (não teoria unificada — há tensões internas, especialmente entre enativismo radical e mente estendida). Usar versão de Gallagher (2017), a mais inclusiva. Embodied (corpo inseparável do pensamento), Embedded (imerso no ambiente), Enacted (emerge da ação, não da representação), Extended (distribuída entre cérebro, corpo e ferramentas). A T4P opera nos 4 E's simultaneamente — e habita a tensão entre eles em vez de resolvê-la: o conhecimento emerge da interação (enacted) E é estendido pela ferramenta (extended). Evan Thompson (co-autor de The Embodied Mind com Varela) é a ponte entre enativismo e 4E.",
    keyWorks: ["Varela, Thompson & Rosch — The Embodied Mind (1991)", "Gallagher — Enactivist Interventions (2017)", "Newen, de Bruin & Gallagher — The Oxford Handbook of 4E Cognition (2018)", "Hutto & Myin — Radicalizing Enactivism (2013)"] },
  { id: "gibson", label: "James Gibson", group: "fundamentos", subtitle: "Affordances · Percepção ecológica direta", weight: 5, status: "evidência",
    theory: "Teoria ecológica da percepção: o ambiente oferece affordances (possibilidades de ação) percebidas diretamente, sem representação interna. A T4P afforda percepção de complexidade que não existia antes. Tensão produtiva com Clark (Lastro): Gibson defende percepção direta (sem representação), Clark defende processamento preditivo (percepção como inferência). São incompatíveis como teorias da percepção — mas affordances como conceito operacional funciona independente da teoria completa. O paper usa affordances sem comprar percepção direta.",
    keyWorks: ["The Ecological Approach to Visual Perception (1979)", "The Senses Considered as Perceptual Systems (1966)"],
    quote: "\"We perceive not properties of things, but affordances of things.\"" },
  { id: "hutchins", label: "Edwin Hutchins", group: "linhagem", subtitle: "Cognição distribuída · Cognition in the Wild", weight: 7, status: "evidência",
    theory: "Cognição distribuída: o sistema cognitivo não está na cabeça do indivíduo — está distribuído entre pessoas, ferramentas e artefatos. Em Cognition in the Wild (1995), nenhum navegador individual tem o conhecimento completo, mas o sistema navio-instrumentos-equipe navega. Isso é a tese da T4P dita em linguagem de ciência cognitiva empírica: o pesquisador + T4P como sistema cognitivo distribuído que percebe o que nenhum dos dois percebe sozinho. Fortalece a Percepção Estendida com base empírica (não só filosófica).",
    keyWorks: ["Cognition in the Wild (1995)", "Distributed Cognition and the Will to Live (2000)"],
    quote: "\"The cognitive properties of groups are produced by interaction between structures internal to individuals and structures external to individuals.\"" },

// ═══════════════════════════════════════════════════════════════════════════════
// REDUCER
// ═══════════════════════════════════════════════════════════════════════════════

function reducer(state, action) {
  switch (action.type) {
    case "ADD_NODE": {
      if (state.nodes.find((n) => n.id === action.node.id)) return state;
      return { ...state, nodes: [...state.nodes, action.node] };
    }
    case "ADD_EDGE": {
      const dup = state.edges.find((e) => (e.s === action.edge.s && e.t === action.edge.t) || (e.s === action.edge.t && e.t === action.edge.s));
      if (dup) return state;
      return { ...state, edges: [...state.edges, action.edge] };
    }
    case "UPDATE_NODE":
      return { ...state, nodes: state.nodes.map((n) => n.id === action.id ? { ...n, ...action.fields } : n) };
    case "REMOVE_NODE":
      return { ...state, nodes: state.nodes.filter((n) => n.id !== action.id), edges: state.edges.filter((e) => e.s !== action.id && e.t !== action.id) };
    case "REMOVE_EDGE":
      return { ...state, edges: state.edges.filter((_, i) => i !== action.index) };
    case "LOAD":
      return action.state;
    default: return state;
  }
}

// PARTICLES

function Particles({ edges, pos, tf, nodes }) {
  const ref = useRef(null);
  const pts = useRef([]);
  const raf = useRef(null);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const resize = () => { c.width = c.parentElement?.clientWidth || 800; c.height = c.parentElement?.clientHeight || 600; };
    resize();

    const draw = () => {
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.save(); ctx.translate(tf.x, tf.y); ctx.scale(tf.k, tf.k);

      if (pts.current.length < 90 && edges.length > 0) {
        const e = edges[Math.floor(Math.random() * edges.length)];
        const a = pos[e.s], b = pos[e.t];
        if (a && b) {
          const nd = nodes.find((n) => n.id === e.s);
          pts.current.push({ ax: a.x, ay: a.y, bx: b.x, by: b.y, p: 0, sp: 0.002 + Math.random() * 0.007, life: 1, col: GC[nd?.group] || "#555", str: e.str || 1 });
        }
      }

      pts.current = pts.current.filter((p) => p.life > 0);
      pts.current.forEach((p) => {
        p.p += p.sp; if (p.p >= 1) { p.p = 0; p.life -= 0.1; }
        const x = p.ax + (p.bx - p.ax) * p.p, y = p.ay + (p.by - p.ay) * p.p;
        const a = Math.min(p.life, 0.7) * (0.25 + p.str * 0.1);
        const hex = Math.round(a * 255).toString(16).padStart(2, "0");
        ctx.beginPath(); ctx.arc(x, y, 1 + p.str * 0.3, 0, Math.PI * 2); ctx.fillStyle = p.col + hex; ctx.fill();
        const hex2 = Math.round(a * 50).toString(16).padStart(2, "0");
        ctx.beginPath(); ctx.arc(x, y, 3 + p.str * 0.5, 0, Math.PI * 2); ctx.fillStyle = p.col + hex2; ctx.fill();
      });

      ctx.restore();
      raf.current = requestAnimationFrame(draw);
    };
    raf.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf.current);
  }, [edges.length, pos, tf]);

  return <canvas ref={ref} style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 1 }} />;
}

function Rizoma({ state, dispatch }) {
  const svgRef = useRef(null);
  const simRef = useRef(null);
  const [sel, setSel] = useState(null);
  const [hov, setHov] = useState(null);
  const [hovE, setHovE] = useState(null);
  const [pos, setPos] = useState({});
  const [adding, setAdding] = useState(null);
  const [connecting, setConnecting] = useState(null);
  const [filter, setFilter] = useState("all");
  const [tf, setTf] = useState({ x: 0, y: 0, k: 1 });
  const [tick, setTick] = useState(0);
  const [emergences, setEmergences] = useState([]);
  const [drag, setDrag] = useState(null);

  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 50); return () => clearInterval(id); }, []);

  useEffect(() => {
    if (simRef.current) simRef.current.stop();
    const nodes = state.nodes.map((n) => ({ ...n, x: pos[n.id]?.x ?? 400 + (Math.random() - 0.5) * 400, y: pos[n.id]?.y ?? 300 + (Math.random() - 0.5) * 300 }));
    const links = state.edges.map((e) => ({ source: e.s, target: e.t, str: e.str }));

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id).distance((d) => 140 - (d.str || 1) * 12).strength((d) => 0.05 + (d.str || 1) * 0.03))
      .force("charge", d3.forceManyBody().strength((d) => -70 - (d.weight || 5) * 12))
      .force("center", d3.forceCenter(400, 300).strength(0.006))
      .force("collision", d3.forceCollide((d) => 16 + (d.weight || 5) * 1.5))
      .alphaDecay(0.006).velocityDecay(0.35).alphaMin(0.0005);

    simRef.current = sim;
    let frame;
    const loop = () => {
      const p = {}; sim.nodes().forEach((n) => { p[n.id] = { x: n.x, y: n.y }; }); setPos({ ...p });
      const ns = sim.nodes();
      const clusters = []; const visited = new Set();
      ns.forEach((n) => {
        if (visited.has(n.id)) return;
        const cl = [n]; visited.add(n.id);
        ns.forEach((m) => { if (m.id !== n.id && !visited.has(m.id) && Math.hypot(n.x - m.x, n.y - m.y) < 55) { cl.push(m); visited.add(m.id); } });
        if (cl.length >= 3) clusters.push({ x: cl.reduce((s, c) => s + c.x, 0) / cl.length, y: cl.reduce((s, c) => s + c.y, 0) / cl.length, n: cl.length });
      });
      setEmergences(clusters);
      if (sim.alpha() > 0.0005) frame = requestAnimationFrame(loop);
    };
    frame = requestAnimationFrame(loop);
    return () => { sim.stop(); cancelAnimationFrame(frame); };
  }, [state.nodes.length, state.edges.length]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    const zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => setTf({ x: e.transform.x, y: e.transform.y, k: e.transform.k }));
    svg.call(zoom); return () => svg.on(".zoom", null);
  }, []);

  const startDrag = (e, nid) => { e.stopPropagation(); setDrag(nid); };
  useEffect(() => {
    if (!drag) return;
    const move = (e) => {
      const sim = simRef.current; if (!sim) return;
      const node = sim.nodes().find((n) => n.id === drag);
      if (node) { node.fx = (e.clientX - tf.x) / tf.k; node.fy = (e.clientY - tf.y - 40) / tf.k; sim.alpha(0.08).restart(); }
    };
    const up = () => {
      const sim = simRef.current; if (sim) { const node = sim.nodes().find((n) => n.id === drag); if (node) { node.fx = null; node.fy = null; } }
      setDrag(null);
    };
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
  }, [drag, tf]);

  const filtered = filter === "all" ? state.nodes : state.nodes.filter((n) => n.group === filter);
  const fIds = new Set(filtered.map((n) => n.id));
  const visE = state.edges.filter((e) => fIds.has(e.s) && fIds.has(e.t));
  const selNode = state.nodes.find((n) => n.id === sel);
  const hovNode = state.nodes.find((n) => n.id === hov);
  const cc = {}; state.edges.forEach((e) => { cc[e.s] = (cc[e.s] || 0) + 1; cc[e.t] = (cc[e.t] || 0) + 1; });
  const groups = ["all", ...new Set(state.nodes.map((n) => n.group))];

  return (
    <div className="flex h-full">
      <div className="flex-1 relative bg-gray-950">
        <Particles edges={visE} pos={pos} tf={tf} nodes={state.nodes} />

        <div className="absolute top-3 left-3 z-10 flex items-center gap-2">
          <button onClick={() => setAdding({ label: "", note: "" })} className="px-3 py-1.5 bg-emerald-900 text-emerald-300 text-xs rounded-lg border border-emerald-700 hover:bg-emerald-800">+ Conceito</button>
          {connecting && <span className="px-3 py-1.5 bg-amber-900 text-amber-300 text-xs rounded-lg border border-amber-700 animate-pulse">Conectando: {state.nodes.find((n) => n.id === connecting)?.label} <button onClick={() => setConnecting(null)} className="ml-2 text-amber-500">✕</button></span>}
        </div>

        <div className="absolute top-3 right-3 z-10 flex items-center gap-1 flex-wrap">
          {groups.map((g) => (
            <button key={g} onClick={() => setFilter(g)}
              className={`px-2 py-1 text-xs rounded-md transition-all ${filter === g ? "text-white" : "text-gray-500 hover:text-gray-300"}`}
              style={filter === g ? { backgroundColor: `${GC[g] || "#666"}33`, border: `1px solid ${GC[g] || "#666"}55` } : { border: "1px solid transparent" }}>
              {g === "all" ? "Todos" : GL[g] || g}
            </button>
          ))}
        </div>

        {adding && (
          <div className="absolute inset-0 z-20 flex items-center justify-center bg-black bg-opacity-60">
            <div className="bg-gray-900 border border-gray-700 rounded-xl p-5 w-80">
              <h3 className="text-white font-bold mb-3">Novo Conceito</h3>
              <input value={adding.label} onChange={(e) => setAdding({ ...adding, label: e.target.value })} placeholder="Nome"
                className="w-full bg-gray-800 text-white rounded-lg px-3 py-2 text-sm mb-2 border border-gray-700 outline-none focus:border-emerald-500" />
              <textarea value={adding.note} onChange={(e) => setAdding({ ...adding, note: e.target.value })} placeholder="Conteúdo teórico..."
                className="w-full bg-gray-800 text-white rounded-lg px-3 py-2 text-sm mb-3 border border-gray-700 outline-none focus:border-emerald-500 h-24 resize-none" />
              <div className="flex gap-2">
                <button onClick={() => { if (adding.label.trim()) { dispatch({ type: "ADD_NODE", node: { id: `c-${Date.now()}`, label: adding.label, group: "custom", theory: adding.note, subtitle: "", weight: 4, status: "hipótese" } }); setAdding(null); } }}
                  className="flex-1 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-500">Adicionar</button>
                <button onClick={() => setAdding(null)} className="px-4 py-2 bg-gray-700 text-gray-300 text-sm rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>
        )}

        {hovNode && !sel && pos[hovNode.id] && (
          <div className="absolute z-10 pointer-events-none px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg max-w-72 shadow-2xl"
            style={{ left: Math.min(pos[hovNode.id].x * tf.k + tf.x + 20, 600), top: pos[hovNode.id].y * tf.k + tf.y - 10 }}>
            <p className="text-white text-xs font-bold">{hovNode.label}</p>
            {hovNode.subtitle && <p className="text-gray-400 text-[10px] italic mt-0.5">{hovNode.subtitle}</p>}
            {hovNode.theory && <p className="text-gray-500 text-[10px] mt-1">{hovNode.theory.slice(0, 150)}...</p>}
            <p className="text-gray-600 text-[10px] mt-1 font-mono">{cc[hovNode.id] || 0} conexões · peso {hovNode.weight}/10</p>
          </div>
        )}

        <svg ref={svgRef} width="100%" height="100%" style={{ cursor: drag ? "grabbing" : "grab", position: "relative", zIndex: 2 }}>
          <defs>
            {Object.entries(GC).map(([g, c]) => (
              <radialGradient key={g} id={`gl-${g}`}><stop offset="0%" stopColor={c} stopOpacity="0.25" /><stop offset="100%" stopColor={c} stopOpacity="0" /></radialGradient>
            ))}
          </defs>
          <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`}>
            {emergences.map((em, i) => (
              <g key={`em-${i}`}>
                <circle cx={em.x} cy={em.y} r={18 + em.n * 7} fill="none" stroke="#8b5cf6" strokeWidth={0.5}
                  opacity={0.12 + Math.sin(tick * 0.04 + i) * 0.06} strokeDasharray="4 8" />
                <text x={em.x} y={em.y - 18 - em.n * 7} textAnchor="middle" fill="#8b5cf6" fontSize={7} opacity={0.3} fontFamily="monospace">emergência ({em.n})</text>
              </g>
            ))}

            {visE.map((e, i) => {
              const a = pos[e.s], b = pos[e.t]; if (!a || !b) return null;
              const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2, isH = hovE === i, str = e.str || 1;
              const nd = state.nodes.find((n) => n.id === e.s);
              return (
                <g key={`e-${i}`} onMouseEnter={() => setHovE(i)} onMouseLeave={() => setHovE(null)}>
                  <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={isH ? "#fff" : GC[nd?.group] || "#444"} strokeWidth={isH ? 2 : 0.3 + str * 0.3} opacity={isH ? 0.7 : 0.08 + str * 0.05} />
                  {isH && e.label && <g><rect x={mx - e.label.length * 2.5 - 4} y={my - 15} width={e.label.length * 5 + 8} height={14} rx={3} fill="#111" fillOpacity={0.95} stroke="#555" strokeWidth={0.5} /><text x={mx} y={my - 5} textAnchor="middle" fill="#ccc" fontSize={8} fontFamily="monospace">{e.label}</text></g>}
                </g>
              );
            })}

            {filtered.map((n) => {
              const p = pos[n.id]; if (!p) return null;
              const isSel = sel === n.id, isH = hov === n.id;
              const col = GC[n.group] || "#666";
              const w = n.weight || 5, r = 5 + w * 1.1 + (cc[n.id] || 0) * 0.4;
              const badge = SB[n.status], isNew = n.group === "discovered";

              return (
                <g key={n.id} transform={`translate(${p.x},${p.y})`} style={{ cursor: drag === n.id ? "grabbing" : "pointer" }}
                  onMouseEnter={() => !drag && setHov(n.id)} onMouseLeave={() => setHov(null)}
                  onMouseDown={(e) => startDrag(e, n.id)}
                  onClick={() => { if (drag) return; if (connecting && connecting !== n.id) { dispatch({ type: "ADD_EDGE", edge: { s: connecting, t: n.id, label: "", str: 1 } }); setConnecting(null); } else setSel(isSel ? null : n.id); }}>
                  {w >= 7 && <circle r={r * 2.5} fill={`url(#gl-${n.group})`} opacity={0.3 + Math.sin(tick * 0.02 + w) * 0.1} />}
                  {isNew && <circle r={r + 8 + Math.sin(tick * 0.07) * 3} fill="none" stroke="#22d3ee" strokeWidth={1} opacity={0.4} />}
                  {isSel && <circle r={r + 5} fill="none" stroke={col} strokeWidth={1.5} opacity={0.5} strokeDasharray="3 3" />}
                  {isH && !isSel && <circle r={r + 3 + Math.sin(tick * 0.1) * 1.5} fill="none" stroke={col} strokeWidth={0.8} opacity={0.3} />}
                  <circle r={r} fill={`${col}${isH || isSel ? "33" : "15"}`} stroke={col} strokeWidth={isSel ? 2.5 : isH ? 2 : 1} />
                  {n.theory && n.theory.length > 30 && <circle r={2} fill={col} opacity={0.5} />}
                  <text y={r + 11} textAnchor="middle" fill={isH || isSel ? "#fff" : col} fontSize={w >= 8 ? 9 : 7.5} fontWeight={w >= 8 ? 700 : 500} fontFamily="system-ui"
                    style={{ pointerEvents: "none", textShadow: "0 1px 3px rgba(0,0,0,0.8)" }}>{n.label}</text>
                  {badge && w >= 7 && <text y={-r - 4} textAnchor="middle" fill={badge.c} fontSize={6} fontFamily="monospace" opacity={0.5} style={{ pointerEvents: "none" }}>{badge.l}</text>}
                </g>
              );
            })}
          </g>
        </svg>

        <div className="absolute bottom-3 left-3 z-10 flex items-center gap-3 text-gray-600 text-xs font-mono">
          <span>{state.nodes.length} conceitos</span><span>{state.edges.length} conexões</span>
          {emergences.length > 0 && <span className="text-violet-400">{emergences.length} emergências</span>}
        </div>
      </div>

      {selNode && <Detail node={selNode} edges={state.edges} nodes={state.nodes} dispatch={dispatch}
        onClose={() => setSel(null)} onConnect={(id) => { setConnecting(id); setSel(null); }}
        onRemove={(id) => { dispatch({ type: "REMOVE_NODE", id }); setSel(null); }} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MEMORY MAP
// ═══════════════════════════════════════════════════════════════════════════════

function Memory({ memories, nodes }) {
  const [filter, setFilter] = useState("all");
  const [sel, setSel] = useState(null);
  const svgRef = useRef(null);
  const [pos, setPos] = useState({});
  const [tf, setTf] = useState({ x: 0, y: 0, k: 1 });
  const [tick, setTick] = useState(0);

  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 60); return () => clearInterval(id); }, []);

  const filtered = filter === "all" ? memories : memories.filter((m) => m.type === filter);

  useEffect(() => {
    const mNodes = memories.map((m, i) => ({ id: m.id, x: 120 + (i % 5) * 130, y: 80 + Math.floor(i / 5) * 110 }));
    const cIds = new Set(); memories.forEach((m) => m.conns?.forEach((c) => cIds.add(c)));
    const cNodes = [...cIds].map((c) => ({ id: `r-${c}`, x: Math.random() * 600 + 80, y: Math.random() * 400 + 40 }));
    const links = []; memories.forEach((m) => m.conns?.forEach((c) => { if (cIds.has(c)) links.push({ source: m.id, target: `r-${c}` }); }));

    const sim = d3.forceSimulation([...mNodes, ...cNodes])
      .force("link", d3.forceLink(links).id((d) => d.id).distance(75).strength(0.2))
      .force("charge", d3.forceManyBody().strength(-120))
      .force("center", d3.forceCenter(380, 250))
      .force("collision", d3.forceCollide(26)).alphaDecay(0.02);

    let frame;
    const loop = () => { const p = {}; sim.nodes().forEach((n) => { p[n.id] = { x: n.x, y: n.y }; }); setPos({ ...p }); if (sim.alpha() > 0.002) frame = requestAnimationFrame(loop); };
    frame = requestAnimationFrame(loop);
    return () => { sim.stop(); cancelAnimationFrame(frame); };
  }, [memories.length]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => setTf({ x: e.transform.x, y: e.transform.y, k: e.transform.k }));
    svg.call(zoom); return () => svg.on(".zoom", null);
  }, []);

  const selMem = memories.find((m) => m.id === sel);
  const types = ["all", ...new Set(memories.map((m) => m.type))];
  const cIds = new Set(); memories.forEach((m) => m.conns?.forEach((c) => cIds.add(c)));

  return (
    <div className="flex h-full">
      <div className="flex-1 relative bg-gray-950">
        <div className="absolute top-3 left-3 z-10 flex items-center gap-1 flex-wrap">
          {types.map((t) => (
            <button key={t} onClick={() => setFilter(t)}
              className={`px-2 py-1 text-xs rounded-md transition-all ${filter === t ? "text-white" : "text-gray-500 hover:text-gray-300"}`}
              style={filter === t ? { backgroundColor: `${MC[t] || "#666"}33`, border: `1px solid ${MC[t] || "#666"}55` } : { border: "1px solid transparent" }}>
              {t === "all" ? "Todos" : t}
            </button>
          ))}
        </div>

        <svg ref={svgRef} width="100%" height="100%" style={{ cursor: "grab" }}>
          <defs>{Object.entries(MC).map(([t, c]) => (<radialGradient key={t} id={`mg-${t}`}><stop offset="0%" stopColor={c} stopOpacity="0.2" /><stop offset="100%" stopColor={c} stopOpacity="0" /></radialGradient>))}</defs>
          <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`}>
            {memories.map((m) => (m.conns || []).map((c) => { const a = pos[m.id], b = pos[`r-${c}`]; if (!a || !b) return null; return <line key={`${m.id}-${c}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={MC[m.type] || "#555"} strokeWidth={0.6} opacity={0.12 + Math.sin(tick * 0.04 + m.id.charCodeAt(1)) * 0.06} strokeDasharray="4 6" />; }))}

            {[...cIds].map((cId) => { const p = pos[`r-${cId}`]; const concept = nodes.find((n) => n.id === cId); if (!p || !concept) return null;
              return <g key={`r-${cId}`} transform={`translate(${p.x},${p.y})`}><circle r={9} fill={`${GC[concept.group] || "#555"}08`} stroke={GC[concept.group] || "#555"} strokeWidth={0.5} strokeDasharray="2 3" opacity={0.4} /><text y={16} textAnchor="middle" fill={GC[concept.group] || "#555"} fontSize={7} fontFamily="monospace" opacity={0.4}>{concept.label}</text></g>;
            })}

            {filtered.map((m) => { const p = pos[m.id]; if (!p) return null; const col = MC[m.type] || "#666"; const isSel = sel === m.id; const agent = AGENTS.find((a) => a.id === m.by);
              return (
                <g key={m.id} transform={`translate(${p.x},${p.y})`} style={{ cursor: "pointer" }} onClick={() => setSel(isSel ? null : m.id)}>
                  <circle r={28} fill={`url(#mg-${m.type})`} opacity={isSel ? 0.8 : 0.4} />
                  {isSel && <rect x={-30} y={-14} width={60} height={28} rx={7} fill="none" stroke={col} strokeWidth={1.5} opacity={0.5} />}
                  <rect x={-26} y={-10} width={52} height={20} rx={4} fill={`${col}18`} stroke={col} strokeWidth={isSel ? 2 : 1} />
                  <text textAnchor="middle" dominantBaseline="central" fill={col} fontSize={7.5} fontWeight={700} fontFamily="system-ui" style={{ pointerEvents: "none" }}>{m.type.slice(0, 5).toUpperCase()}</text>
                  <text y={22} textAnchor="middle" fill="#bbb" fontSize={7} fontFamily="system-ui" style={{ pointerEvents: "none" }}>{m.label.length > 22 ? m.label.slice(0, 20) + "..." : m.label}</text>
                  {agent && <text y={-16} textAnchor="middle" fontSize={11} style={{ pointerEvents: "none" }}>{agent.emoji}</text>}
                </g>
              );
            })}
          </g>
        </svg>

        <div className="absolute bottom-3 left-3 z-10 text-gray-600 text-xs font-mono">{memories.length} registros · {[...cIds].length} conceitos</div>
      </div>

      {selMem && (
        <div className="w-80 bg-gray-900 border-l border-gray-800 overflow-y-auto flex-none">
          <div className="p-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs px-2 py-0.5 rounded-full font-mono" style={{ backgroundColor: `${MC[selMem.type]}22`, color: MC[selMem.type] }}>{selMem.type}</span>
              <button onClick={() => setSel(null)} className="text-gray-500 hover:text-white">&times;</button>
            </div>
            <h3 className="text-white font-bold mb-2">{selMem.label}</h3>
            <p className="text-gray-300 text-sm leading-relaxed mb-3">{selMem.content}</p>
            <div className="flex items-center gap-2 text-xs text-gray-500 mb-3">
              <span>{AGENTS.find((a) => a.id === selMem.by)?.emoji}</span>
              <span>{AGENTS.find((a) => a.id === selMem.by)?.label}</span>
              <span className="text-gray-700">·</span>
              <span className="font-mono">{selMem.date}</span>
            </div>
            {selMem.conns?.length > 0 && <div><h4 className="text-gray-500 text-xs font-mono uppercase tracking-wider mb-2">Conceitos</h4>
              {selMem.conns.map((c) => { const concept = nodes.find((n) => n.id === c); return <div key={c} className="flex items-center gap-2 text-xs p-1 rounded hover:bg-gray-800"><span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: GC[concept?.group] || "#555" }} /><span className="text-gray-300">{concept?.label || c}</span></div>; })}
            </div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAPER
// ═══════════════════════════════════════════════════════════════════════════════

function Paper({ sections, onUpdate, nodes }) {
  const [sel, setSel] = useState("s0");
  const sec = sections.find((s) => s.id === sel) || sections[0];
  const wc = (s) => (s.body || "").split(/\s+/).filter(Boolean).length;
  const totalWc = sections.reduce((a, s) => a + wc(s), 0);
  const statuses = Object.keys(PS);

  return (
    <div className="flex h-full">
      <div className="w-64 bg-gray-900 border-r border-gray-800 overflow-y-auto flex-none">
        <div className="p-3 border-b border-gray-800">
          <h3 className="text-white font-bold text-sm mb-1">Estrutura do Paper</h3>
          <div className="flex items-center gap-2 text-xs text-gray-500 font-mono">
            <span>{totalWc} palavras</span>
            <span>·</span>
            <span>{sections.filter((s) => s.status === "pronto").length}/{sections.length} seções</span>
          </div>
          <div className="mt-2 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div className="h-full bg-emerald-600 rounded-full transition-all" style={{ width: `${(sections.filter((s) => s.status === "pronto").length / sections.length) * 100}%` }} />
          </div>
        </div>
        <div className="p-2 space-y-0.5">
          {sections.map((s) => {
            const isSel = sel === s.id;
            const words = wc(s);
            const col = PS[s.status]?.c || "#666";
            return (
              <button key={s.id} onClick={() => setSel(s.id)}
                className={`w-full text-left px-3 py-2.5 rounded-lg transition-all ${isSel ? "bg-gray-800" : "hover:bg-gray-800"}`}>
                <div className="flex items-center gap-2">
                  <span className="text-gray-600 text-xs font-mono w-4">{s.num}</span>
                  <span className={`text-sm flex-1 truncate ${isSel ? "text-white font-medium" : "text-gray-400"}`}>{s.title}</span>
                </div>
                <div className="flex items-center gap-2 mt-1 ml-6">
                  <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: col }} />
                  <span className="text-[10px] font-mono" style={{ color: col }}>{PS[s.status]?.l}</span>
                  {words > 0 && <span className="text-[10px] text-gray-600 font-mono">{words}w</span>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto">
        <div className="max-w-3xl mx-auto py-8 px-6">
          <div className="mb-6">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-gray-600 text-sm font-mono">§{sec.num}</span>
              <div className="flex gap-1">
                {statuses.map((st) => (
                  <button key={st} onClick={() => onUpdate(sec.id, { status: st })}
                    className={`px-2 py-0.5 rounded text-[10px] font-mono transition-all ${sec.status === st ? "opacity-100" : "opacity-25 hover:opacity-50"}`}
                    style={{ backgroundColor: `${PS[st].c}22`, color: PS[st].c }}>{PS[st].l}</button>
                ))}
              </div>
            </div>
            <input value={sec.title} onChange={(e) => onUpdate(sec.id, { title: e.target.value })}
              className="text-2xl font-bold text-white bg-transparent border-none outline-none w-full placeholder-gray-700"
              placeholder="Título da seção" />
          </div>

          {sec.guide && (
            <div className="mb-6 p-4 rounded-lg bg-gray-900 border border-gray-800">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs font-mono text-amber-500 uppercase tracking-wider">Guia</span>
                <span className="text-[10px] text-gray-600">(visível apenas para ti)</span>
              </div>
              <p className="text-gray-400 text-sm leading-relaxed">{sec.guide}</p>
            </div>
          )}

          {sec.nodes?.length > 0 && (
            <div className="mb-6">
              <h4 className="text-xs font-mono text-gray-600 uppercase tracking-wider mb-2">Nós mobilizados</h4>
              <div className="flex flex-wrap gap-1.5">
                {sec.nodes.map((nid) => {
                  const n = nodes.find((x) => x.id === nid);
                  if (!n) return null;
                  const col = GC[n.group] || "#666";
                  return (
                    <span key={nid} className="px-2 py-1 rounded-md text-xs flex items-center gap-1.5"
                      style={{ backgroundColor: `${col}15`, color: col, border: `1px solid ${col}30` }}>
                      <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: col }} />
                      {n.label}
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          <div className="mb-6">
            <div className="flex items-center justify-between mb-2">
              <h4 className="text-xs font-mono text-gray-600 uppercase tracking-wider">Narrativa</h4>
              <span className="text-xs text-gray-600 font-mono">{wc(sec)} palavras</span>
            </div>
            <textarea value={sec.body || ""} onChange={(e) => onUpdate(sec.id, { body: e.target.value })}
              placeholder="Escreva o conteúdo desta seção..."
              className="w-full bg-gray-900 text-gray-200 rounded-lg px-5 py-4 text-sm leading-relaxed border border-gray-800 outline-none focus:border-violet-800 resize-none transition-colors"
              style={{ minHeight: 280, fontFamily: "Georgia, 'Times New Roman', serif" }} />
          </div>

          <div className="mb-6">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xs font-mono uppercase tracking-wider" style={{ color: "#8b5cf6" }}>↺ Nota recursiva</span>
              <span className="text-[10px] text-gray-600">O que escrever esta seção revelou sobre o argumento</span>
            </div>
            <textarea value={sec.recursive || ""} onChange={(e) => onUpdate(sec.id, { recursive: e.target.value })}
              placeholder="O que mudou no seu olhar ao escrever esta seção? Que reconfiguração aconteceu?"
              className="w-full bg-violet-950 text-violet-200 rounded-lg px-4 py-3 text-xs leading-relaxed border border-violet-900 outline-none focus:border-violet-700 resize-none"
              style={{ minHeight: 80, fontStyle: "italic" }} />
          </div>

          <div className="flex justify-between pt-4 border-t border-gray-800">
            {sections.findIndex((s) => s.id === sel) > 0 ? (
              <button onClick={() => setSel(sections[sections.findIndex((s) => s.id === sel) - 1].id)}
                className="text-xs text-gray-500 hover:text-gray-300 transition-colors">← seção anterior</button>
            ) : <div />}
            {sections.findIndex((s) => s.id === sel) < sections.length - 1 ? (
              <button onClick={() => setSel(sections[sections.findIndex((s) => s.id === sel) + 1].id)}
                className="text-xs text-gray-500 hover:text-gray-300 transition-colors">próxima seção →</button>
            ) : <div />}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN — with localStorage persistence
// ═══════════════════════════════════════════════════════════════════════════════

function MindhiveDashboard() {
  const [tab, setTab] = useState("rizoma");
  const [state, dispatch] = useReducer(reducer, null, () => loadState("graph", { nodes: CONCEPTS, edges: EDGES }));
  const [memories] = useState(MEMORIES);
  const [paper, setPaper] = useState(() => loadState("paper", PAPER_INIT));

  // Auto-save to localStorage
  useEffect(() => { saveState("graph", state); }, [state]);
  useEffect(() => { saveState("paper", paper); }, [paper]);

  const updateSection = (id, fields) => {
    setPaper((prev) => prev.map((s) => s.id === id ? { ...s, ...fields } : s));
  };

  const resetAll = () => {
    if (confirm("Resetar tudo para o estado original? Isso apaga todas as edições salvas neste navegador.")) {
      dispatch({ type: "LOAD", state: { nodes: CONCEPTS, edges: EDGES } });
      setPaper(PAPER_INIT);
      localStorage.removeItem(`${STORAGE_KEY}-graph`);
      localStorage.removeItem(`${STORAGE_KEY}-paper`);
    }
  };

  return (
    <div className="w-full h-screen bg-gray-950 text-white flex flex-col overflow-hidden" style={{ fontFamily: "system-ui, -apple-system, sans-serif" }}>
      <div className="flex-none border-b border-gray-800">
        <div className="flex items-center justify-between px-4 py-2">
          <div className="flex items-center gap-2">
            <div className="w-2 h-2 rounded-full bg-violet-500" style={{ boxShadow: "0 0 8px #8b5cf6" }} />
            <span className="font-bold text-sm tracking-wide">MINDHIVE</span>
            <span className="text-gray-600 text-xs font-mono ml-1">pesquisa recursiva aplicada</span>
          </div>
          <div className="flex items-center gap-0.5 bg-gray-900 rounded-xl p-0.5">
            {[{ id: "rizoma", label: "🌿 Rizoma" }, { id: "paper", label: "📄 Paper" }, { id: "memory", label: "🧠 Memória" }].map((t) => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-5 py-1.5 text-xs rounded-lg transition-all ${tab === t.id ? "bg-gray-700 text-white" : "text-gray-500 hover:text-gray-300"}`}>{t.label}</button>
            ))}
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs text-gray-600 font-mono">{state.nodes.length}n · {state.edges.length}e · {memories.length}m</span>
            <button onClick={resetAll} className="text-[10px] text-gray-700 hover:text-red-400 font-mono transition-colors" title="Resetar para estado original">reset</button>
          </div>
        </div>
      </div>
      <div className="flex-1 overflow-hidden">
        {tab === "rizoma" && <Rizoma state={state} dispatch={dispatch} />}
        {tab === "paper" && <Paper sections={paper} onUpdate={updateSection} nodes={state.nodes} />}
        {tab === "memory" && <Memory memories={memories} nodes={state.nodes} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MindhiveDashboard />);
  </script>
</body>
</html>
